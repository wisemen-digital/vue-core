---
name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: ['main']

jobs:
  lint-build-test:
    uses: wisemen-digital/devops-github-actions/.github/workflows/web-build-and-test.yml@main
    if: github.head_ref != 'changeset-release/main' && github.event.pull_request.draft == false